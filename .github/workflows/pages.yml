name: Deploy to GitHub Pages

on:
  push:
    branches: ['main']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: 1_project_files/cooking-ai-planner/package-lock.json

      - name: Install
        working-directory: 1_project_files/cooking-ai-planner
        run: npm ci

      - name: Build
        working-directory: 1_project_files/cooking-ai-planner
        run: npm run build

      - name: Disable Jekyll
        run: touch 1_project_files/cooking-ai-planner/dist/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5
        continue-on-error: true
        with:
          # Some repos return 404 until Pages is enabled; ask the action to enable it if possible.
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Avoid "Multiple artifacts named github-pages" when re-running jobs in the same workflow run.
          name: github-pages-${{ github.run_attempt }}
          path: 1_project_files/cooking-ai-planner/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          artifact_name: github-pages-${{ github.run_attempt }}
